<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Dice Corner Duel</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700;900&family=Cinzel:wght@400;600;700&display=swap"/>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>

  <!-- ── LOBBY ── -->
  <div id="lobby">
    <div id="lobby-bg-overlay"></div>
    <div id="lobby-content">
      <div id="lobby-title-wrap">
        <div id="lobby-subtitle">⚔️</div>
        <h1 id="lobby-title">Dice Corner Duel</h1>
        <p id="lobby-tagline">Roll. Move. Conquer.</p>
      </div>

      <div id="lobby-menu">
        <button class="lobby-btn primary" id="btn-play-bot">⚔ Play with Bot</button>
        <button class="lobby-btn" id="btn-create">＋ Create Game</button>
        <button class="lobby-btn" id="btn-join">↗ Join Game</button>

        <div id="code-row">
          <input
            id="game-code-input"
            type="text"
            placeholder="Enter game code…"
            maxlength="8"
            disabled
          />
        </div>

      </div>
    </div>
  </div>

  <!-- ── GAME ── -->
  <div id="canvas-container" style="display:none"></div>
  <div id="hud" style="display:none"></div>
  <div id="roll-area" style="display:none"></div>
  <div id="game-log" style="display:none"></div>
  <script src="sprites.js"></script>
  <script src="threeScene.js"></script>
  <script src="game.js"></script>
</body>
</html>
